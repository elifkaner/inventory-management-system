services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./src/InventoryManagement.API/.env
    environment:
      DB_HOST: postgres
      ASPNETCORE_URLS: http://0.0.0.0:5000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:5000"

volumes:
  pgdata:
